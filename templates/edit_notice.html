<!DOCTYPE html>
<html>
<head>
    <title>Edit Notice</title>
    <style>
        body {
            background:#0b1f3a;
            color:white;
            padding:40px;
            font-family:Arial;
        }

        input, textarea {
            width:100%;
            padding:10px;
            margin-bottom:15px;
        }

        button {
            padding:10px 20px;
            background:#00c6ff;
            border:none;
            color:white;
        }
    </style>
</head>
<body>

<h2>Edit Notice</h2>

<form method="POST">
    <input type="text" name="title" value="{{ notice.title }}" required>
    <textarea name="content" required>{{ notice.content }}</textarea>
    <button type="submit">Update</button>
</form>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - VVM Dharampur</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0b1f3a, #122f55);
            overflow: hidden;
        }

        /* Glass Login Card */
        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 25px;
            width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .login-card h2 {
            margin-bottom: 30px;
            font-weight: 600;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 12px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .login-card input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(45deg, #2196f3, #00c6ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .login-card button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,198,255,0.6);
        }

        .login-footer {
            margin-top: 20px;
            font-size: 13px;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>Admin Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="login-footer">
        Vivekanand Vidya Mandir Dharampur
    </div>
</div>

</body>
</html>
